name: Build & Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  calculate-version:
    name: Calculate Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.next_version.outputs.version }}
      tag: ${{ steps.next_version.outputs.tag }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get Version Info
        id: version_info
        run: |
          TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "tag=$TAG" >> $GITHUB_OUTPUT
        shell: bash

      - name: Determine Next Version
        id: next_version
        run: |
          TAG="${{ steps.version_info.outputs.tag }}"
          TAG_V=${TAG#v}
          MAJOR=$(echo $TAG_V | cut -d. -f1)
          MINOR=$(echo $TAG_V | cut -d. -f2)
          PATCH=$(echo $TAG_V | cut -d. -f3)
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}"
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "tag=v${NEW_VERSION}" >> $GITHUB_OUTPUT
        shell: bash

  build:
    name: Build (${{ matrix.platform }})
    needs: calculate-version
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            os: windows-latest
            fyne_os: windows
          - platform: macos
            os: macos-latest
            fyne_os: darwin
          - platform: linux
            os: ubuntu-latest
            fyne_os: linux

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
          cache-dependency-path: go.sum

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev xorg-dev
        shell: bash

      - name: Install Fyne CLI
        run: go install fyne.io/tools/cmd/fyne@latest
        shell: bash

      - name: Package for ${{ matrix.platform }}
        run: |
          VERSION="${{ needs.calculate-version.outputs.version }}"
          
          fyne package -os ${{ matrix.fyne_os }} \
            -icon assets/icon.png \
            -appID net.dpdict.dpd-updater \
            -name dpd-updater
          
          mkdir dist
          
          if [ "${{ matrix.platform }}" = "windows" ]; then
            mv dpd-updater.exe "dist/dpd-updater-windows-$VERSION.exe"
          elif [ "${{ matrix.platform }}" = "macos" ]; then
            zip -r "dist/dpd-updater-macos-$VERSION.zip" dpd-updater.app
          else
            mv dpd-updater "dist/dpd-updater-linux-$VERSION"
            chmod +x "dist/dpd-updater-linux-$VERSION"
          fi
        shell: bash

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dpd-updater-${{ matrix.platform }}
          path: dist/*

  release:
    name: Release
    needs: [calculate-version, build]
    if: success()
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate Changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD~1 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            CHANGELOG=$(git log --pretty=format:"- %s" ${PREV_TAG}..HEAD 2>/dev/null || echo "- Initial release")
          else
            CHANGELOG="- Initial release"
          fi
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        shell: bash

      - name: Tag Release
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ needs.calculate-version.outputs.tag }}
          git push origin ${{ needs.calculate-version.outputs.tag }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.calculate-version.outputs.tag }}
          name: DPD Updater v${{ needs.calculate-version.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## Changes

            ${{ steps.changelog.outputs.changelog }}

            ## Installation

            ### Windows
            Download `dpd-updater-windows-VERSION.exe` and run directly.

            ### macOS
            Download `dpd-updater-macos-VERSION.zip`, extract, and run.

            ### Linux
            Download `dpd-updater-linux-VERSION`, make it executable (`chmod +x`), and run.
          files: |
            artifacts/dpd-updater-windows/*
            artifacts/dpd-updater-linux/*
            artifacts/dpd-updater-macos/*
